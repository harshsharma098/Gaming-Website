<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Account Details – WinBet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .content-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-page); }
    .content-main { flex: 1; padding: 2rem 1.5rem; max-width: 700px; margin: 0 auto; width: 100%; }
    .content-main .back-link { font-size: 0.875rem; color: var(--accent); margin-bottom: 1rem; display: inline-flex; align-items: center; gap: 0.35rem; text-decoration: none; }
    .content-main .back-link:hover { color: var(--accent-hover); }
    .content-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
    .content-card h2 { font-size: 1rem; font-weight: 600; margin: 0 0 1rem 0; }
    .detail-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9375rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row span:first-child { color: var(--text-muted); }
    .btn-edit { background: var(--accent); color: #fff !important; font-size: 0.875rem; padding: 0.4rem 1rem; border-radius: var(--radius-sm); border: none; margin-top: 0.5rem; }
    .btn-edit:hover { background: var(--accent-hover); color: #fff !important; }
  </style>
</head>
<body class="content-page">
  <header class="site-header">
    <div class="header-top">
      <div class="container-fluid d-flex justify-content-between align-items-center px-3 py-2">
        <a href="index.html" class="logo">WinBet</a>
        <div class="header-utils d-flex align-items-center gap-2">
          <a href="search.html" class="btn btn-icon" title="Search"><i class="bi bi-search"></i></a>
          <a href="rules.html" class="text-white text-decoration-none small">Rules</a>
          <a href="signup.html" class="btn btn-signup">Signup</a>
          <a href="profile.html" class="btn btn-profile-icon" title="My Profile"><i class="bi bi-person-circle"></i></a>
          <a href="login.html" class="btn btn-login">Login</a>
        </div>
      </div>
    </div>
    <div class="header-nav">
      <div class="nav-scroll-wrap">
        <button class="nav-arrow nav-arrow-left" type="button" aria-label="Scroll left"><i class="bi bi-chevron-left"></i></button>
        <nav class="header-nav-inner">
          <a href="index.html">HOME</a>
          <a href="match.html">CRICKET</a>
          <a href="casino.html">CASINO</a>
          <a href="promotions.html">PROMOTIONS</a>
        </nav>
        <button class="nav-arrow nav-arrow-right" type="button" aria-label="Scroll right"><i class="bi bi-chevron-right"></i></button>
      </div>
    </div>
  </header>
  <main class="content-main">
    <a href="profile.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Profile</a>
    <h1 class="mb-3"><i class="bi bi-person-vcard me-2"></i>Account Details</h1>
    <div class="content-card">
      <h2>Personal information</h2>
      <div class="detail-row"><span>Full name</span><span>Demo User</span></div>
      <div class="detail-row"><span>Email</span><span>demo_user@winbet.com</span></div>
      <div class="detail-row"><span>Username</span><span>demo_user</span></div>
      <div class="detail-row"><span>Member since</span><span>Jan 2025</span></div>
      <button type="button" class="btn btn-edit">Edit details</button>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
