<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Change Password – WinBet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .content-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-page); }
    .content-main { flex: 1; padding: 2rem 1.5rem; max-width: 440px; margin: 0 auto; width: 100%; }
    .content-main .back-link { font-size: 0.875rem; color: var(--accent); margin-bottom: 1rem; display: inline-flex; align-items: center; gap: 0.35rem; text-decoration: none; }
    .content-main .back-link:hover { color: var(--accent-hover); }
    .content-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
    .content-card .form-control { border-radius: var(--radius-sm); padding: 0.6rem 0.85rem; }
    .btn-save { background: var(--accent); color: #fff !important; font-weight: 600; padding: 0.6rem; border-radius: var(--radius-sm); border: none; width: 100%; }
    .btn-save:hover { background: var(--accent-hover); color: #fff !important; }
  </style>
</head>
<body class="content-page">
  <header class="site-header">
    <div class="header-top">
      <div class="container-fluid d-flex justify-content-between align-items-center px-3 py-2">
        <a href="index.html" class="logo">WinBet</a>
        <div class="header-utils d-flex align-items-center gap-2">
          <a href="search.html" class="btn btn-icon" title="Search"><i class="bi bi-search"></i></a>
          <a href="rules.html" class="text-white text-decoration-none small">Rules</a>
          <a href="signup.html" class="btn btn-signup">Signup</a>
          <a href="profile.html" class="btn btn-profile-icon" title="My Profile"><i class="bi bi-person-circle"></i></a>
          <a href="login.html" class="btn btn-login">Login</a>
        </div>
      </div>
    </div>
    <div class="header-nav">
      <div class="nav-scroll-wrap">
        <button class="nav-arrow nav-arrow-left" type="button" aria-label="Scroll left"><i class="bi bi-chevron-left"></i></button>
        <nav class="header-nav-inner">
          <a href="index.html">HOME</a>
          <a href="match.html">CRICKET</a>
          <a href="casino.html">CASINO</a>
          <a href="promotions.html">PROMOTIONS</a>
        </nav>
        <button class="nav-arrow nav-arrow-right" type="button" aria-label="Scroll right"><i class="bi bi-chevron-right"></i></button>
      </div>
    </div>
  </header>
  <main class="content-main">
    <a href="profile.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Profile</a>
    <h1 class="mb-3"><i class="bi bi-key me-2"></i>Change Password</h1>
    <div class="content-card">
      <form id="changePwdForm" action="profile.html" method="get">
        <div class="mb-3">
          <label class="form-label">Current password</label>
          <input type="password" class="form-control" name="current" required autocomplete="current-password">
        </div>
        <div class="mb-3">
          <label class="form-label">New password</label>
          <input type="password" class="form-control" name="new" required minlength="6" autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm new password</label>
          <input type="password" class="form-control" name="confirm" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-save">Update password</button>
      </form>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('changePwdForm').addEventListener('submit', function(e) {
      var newP = this.querySelector('input[name="new"]').value;
      var conf = this.querySelector('input[name="confirm"]').value;
      if (newP !== conf) { e.preventDefault(); alert('New password and confirm do not match.'); return false; }
    });
  </script>
  <script src="js/app.js"></script>
</body>
</html>
