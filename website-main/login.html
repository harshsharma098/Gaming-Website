<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – WinBet </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-page);
    }

    .auth-header {
      background: var(--bg-header);
      color: #fff;
      padding: 1rem 1.5rem;
    }

    .auth-header a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .auth-card-header {
      background: var(--bg-nav);
      color: #fff;
      padding: 1.25rem;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .auth-card-body {
      padding: 1.75rem;
    }

    .auth-card .form-control {
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.85rem;
    }

    .auth-card .btn-submit {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 0.6rem;
      border-radius: var(--radius-sm);
      border: none;
      width: 100%;
    }

    .auth-card .btn-submit:hover {
      background: var(--accent-hover);
      color: #fff;
    }

    .btn-demo {
      background: var(--bg-page);
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 500;
      padding: 0.6rem;
      border-radius: var(--radius-sm);
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn-demo:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      margin: 1.25rem 0;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="auth-page">
  <header class="auth-header d-flex justify-content-between align-items-center">
    <a href="index.html"><i class="bi bi-arrow-left me-2"></i> WinBet </a>
    <a href="index.html">Back to Home</a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-header">Login</div>
      <div class="auth-card-body">
        <form id="loginForm" action="index.html" method="get">
          <div class="mb-3">
            <label class="form-label">Username or Email</label>
            <input type="text" class="form-control" name="username" id="loginUsername"
              placeholder="Enter username or email" required autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" id="loginPassword" placeholder="Enter password"
              required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-submit">Login</button>
        </form>

        <div class="auth-divider">or</div>

        <button type="button" class="btn btn-demo" id="btnDemoLogin">
          <i class="bi bi-person-check me-2"></i>Login with Demo id
        </button>
      </div>
      <div class="auth-footer px-3 pb-3">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('btnDemoLogin').addEventListener('click', function () {
      document.getElementById('loginUsername').value = 'demo_user';
      document.getElementById('loginPassword').value = 'demo123';
      document.getElementById('loginForm').submit();
    });
  </script>
</body>

</html>
