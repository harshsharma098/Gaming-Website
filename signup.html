<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign Up – WinBet </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-page);
    }

    .auth-header {
      background: var(--bg-header);
      color: #fff;
      padding: 1rem 1.5rem;
    }

    .auth-header a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .auth-card-header {
      background: var(--bg-nav);
      color: #fff;
      padding: 1.25rem;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .auth-card-body {
      padding: 1.75rem;
    }

    .auth-card .form-control {
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.85rem;
    }

    .auth-card .btn-submit {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 0.6rem;
      border-radius: var(--radius-sm);
      border: none;
      width: 100%;
    }

    .auth-card .btn-submit:hover {
      background: var(--accent-hover);
      color: #fff;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 576px) {
      .auth-header {
        padding: 0.75rem 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .auth-header a:last-child {
        font-size: 0.8125rem;
      }
      .auth-main {
        padding: 1.25rem 1rem;
        align-items: flex-start;
        padding-top: 1.5rem;
      }
      .auth-card {
        max-width: 100%;
      }
      .auth-card-body {
        padding: 1.25rem;
      }
    }

    @media (max-width: 400px) {
      .auth-header a:last-child {
        font-size: 0.75rem;
      }
      .auth-main {
        padding: 1rem 0.75rem;
      }
      .auth-card-body {
        padding: 1rem;
      }
    }
  </style>
</head>

<body class="auth-page">
  <header class="auth-header d-flex justify-content-between align-items-center">
    <a href="index.html"><i class="bi bi-arrow-left me-2"></i> WinBet </a>
    <a href="index.html">Back to Home</a>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card-header">Create Account</div>
      <div class="auth-card-body">
        <form id="signupForm" action="index.html" method="get">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" placeholder="Enter your name" required
              autocomplete="name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" placeholder="Enter your email" required
              autocomplete="email">
          </div>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" placeholder="Choose a username" required
              autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" id="signupPassword"
              placeholder="Create a password" required autocomplete="new-password" minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="confirmPassword" placeholder="Confirm password" required
              autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-submit">Sign Up</button>
        </form>
      </div>
      <div class="auth-footer px-3 pb-3">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function (e) {
      var pwd = document.getElementById('signupPassword').value;
      var confirm = this.querySelector('input[name="confirmPassword"]').value;
      if (pwd !== confirm) {
        e.preventDefault();
        alert('Passwords do not match.');
        return false;
      }
    });
  </script>
</body>

</html>
